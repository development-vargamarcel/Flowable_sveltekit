version: '3.8'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: bpm-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE:-h2}
      - SERVER_PORT=8080
      - SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL:-jdbc:h2:file:./data/flowable;MODE=LEGACY;DB_CLOSE_ON_EXIT=FALSE;AUTO_RECONNECT=TRUE}
      - SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME:-sa}
      - SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD:-}
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    networks:
      - bpm-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: bpm-frontend
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=${BACKEND_URL}
      - ORIGIN=${ORIGIN}
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - bpm-network

networks:
  bpm-network:
    driver: bridge
